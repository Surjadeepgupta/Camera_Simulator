<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro Bit Depth Simulator</title>

<style>

body{
background:linear-gradient(135deg,#c8102e 0%,#8b0000 45%,#111 100%);
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
width:1000px;
margin:auto;
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.view{
border:3px solid #333;
padding:10px;
background:#111;
}

canvas{
width:100%;
height:260px;
}

.title{
font-size:16px;
margin-bottom:8px;
}

.rgb{
margin-top:8px;
font-size:12px;
}

.controls{
margin-top:20px;
}

</style>

</head>

<body>
<h2>Color-Bit Depth with Shadow Recovery Realtime Simulator</h2>
<div class="container">

<div class="view">
<div class="title">8 Bit</div>
<canvas id="c8"></canvas>
<div class="rgb">R:<span id="r8"></span> G:<span id="g8"></span> B:<span id="b8"></span></div>
</div>

<div class="view">
<div class="title">10 Bit</div>
<canvas id="c10"></canvas>
<div class="rgb">R:<span id="r10"></span> G:<span id="g10"></span> B:<span id="b10"></span></div>
</div>

<div class="view">
<div class="title">12 Bit</div>
<canvas id="c12"></canvas>
<div class="rgb">R:<span id="r12"></span> G:<span id="g12"></span> B:<span id="b12"></span></div>
</div>

<div class="view">
<div class="title">16 Bit</div>
<canvas id="c16"></canvas>
<div class="rgb">R:<span id="r16"></span> G:<span id="g16"></span> B:<span id="b16"></span></div>
</div>

</div>

<div class="controls">
Shadow Recovery:
<input type="range" min="0" max="100" value="0" id="shadow">
</div>

<video id="cam" autoplay playsinline style="display:none"></video>

<script>

const video=document.getElementById("cam")
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream)

const canvases={
c8:document.getElementById("c8"),
c10:document.getElementById("c10"),
c12:document.getElementById("c12"),
c16:document.getElementById("c16")
}

const ctxs={}
for(let k in canvases){
ctxs[k]=canvases[k].getContext("2d")
}

const sample=document.createElement("canvas")
const sctx=sample.getContext("2d")

const shadowSlider=document.getElementById("shadow")

function q(v,s){ return Math.floor(v/s)*s }

function process(){

let w=320,h=240
sample.width=w
sample.height=h

sctx.drawImage(video,0,0,w,h)
let frame=sctx.getImageData(0,0,w,h)
let data=frame.data

let shadowBoost=shadowSlider.value/100

let r=0,g=0,b=0

let d8=new Uint8ClampedArray(data)
let d10=new Uint8ClampedArray(data)
let d12=new Uint8ClampedArray(data)
let d16=new Uint8ClampedArray(data)

function apply(arr,step,noise,edgeSoft){

for(let i=0;i<arr.length;i+=4){

// shadow recovery
arr[i]+=shadowBoost*100
arr[i+1]+=shadowBoost*100
arr[i+2]+=shadowBoost*100

// clamp
arr[i]=Math.min(255,arr[i])
arr[i+1]=Math.min(255,arr[i+1])
arr[i+2]=Math.min(255,arr[i+2])

// quantization (banding)
arr[i]=q(arr[i],step)
arr[i+1]=q(arr[i+1],step)
arr[i+2]=q(arr[i+2],step)

// noise (8-bit breaks)
arr[i]+=Math.random()*noise
arr[i+1]+=Math.random()*noise
arr[i+2]+=Math.random()*noise

}

}

/* APPLY */

// worst → best
apply(d8,32,20,0)     // harsh
apply(d10,16,10,1)
apply(d12,8,4,2)
apply(d16,2,0,3)      // clean

function draw(ctx,arr){
ctx.putImageData(new ImageData(arr,w,h),0,0)
}

draw(ctxs.c8,d8)
draw(ctxs.c10,d10)
draw(ctxs.c12,d12)
draw(ctxs.c16,d16)

/* RGB SAMPLE */
for(let i=0;i<data.length;i+=4){
r+=data[i]; g+=data[i+1]; b+=data[i+2];
}
let p=data.length/4
r=Math.floor(r/p)
g=Math.floor(g/p)
b=Math.floor(b/p)

r8.innerText=r
g8.innerText=g
b8.innerText=b

r10.innerText=r*4
g10.innerText=g*4
b10.innerText=b*4

r12.innerText=r*16
g12.innerText=g*16
b12.innerText=b*16

r16.innerText=r*256
g16.innerText=g*256
b16.innerText=b*256

requestAnimationFrame(process)

}

video.onplaying=process
document.addEventListener(
"contextmenu",
e=>e.preventDefault()
);

document.addEventListener(
"selectstart",
e=>e.preventDefault()
);

document.addEventListener(
"dragstart",
e=>e.preventDefault()
);

document.addEventListener(
"copy",
e=>e.preventDefault()
);

document.addEventListener(
"cut",
e=>e.preventDefault()
);

document.addEventListener(
"paste",
e=>e.preventDefault()
);

document.addEventListener(
"keydown",
function(e){

const key = e.key.toLowerCase();

if(e.key==="F12"){
e.preventDefault();
}

if(e.ctrlKey && key==="u"){
e.preventDefault();
}

if(e.ctrlKey && key==="s"){
e.preventDefault();
}

if(
e.ctrlKey &&
e.shiftKey &&
key==="i"
){
e.preventDefault();
}

if(
e.ctrlKey &&
e.shiftKey &&
key==="j"
){
e.preventDefault();
}

if(
e.ctrlKey &&
e.shiftKey &&
key==="c"
){
e.preventDefault();
}

}
);

/* DEVTOOLS */

(function(){

function detectDevTools(){

const widthThreshold =
window.outerWidth -
window.innerWidth > 160;

const heightThreshold =
window.outerHeight -
window.innerHeight > 160;

if(
widthThreshold ||
heightThreshold
){

document.body.innerHTML = `

<div style="
width:100vw;
height:100vh;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-family:Arial;
color:red;
">

<div style="
font-size:38px;
font-weight:bold;
margin-bottom:20px;
">

Developer Tools Blocked

</div>

<div style="
font-size:16px;
opacity:0.7;
">

Source Inspection Disabled

</div>

</div>

`;

}

}

setInterval(
detectDevTools,
500
);

})();

/* CLEAR */

setInterval(function(){

console.clear();

},1000);

</script>

</body>
</html>
