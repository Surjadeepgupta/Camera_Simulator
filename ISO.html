<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO Amplification - CLean - Noise</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#c8102e 0%,#8b0000 45%,#111 100%);
color:white;
font-family:Arial;
text-align:center;
user-select:none;
}

#container{
position:relative;
width:100%;
overflow:hidden;
}

video{
width:80%;
height:600px;
}

#shutter{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
pointer-events:none;
transition:opacity .1s;
}

.controls{
background:#111;
padding:10px;
}

button,input{
padding:10px;
margin:5px;
font-size:16px;
width:45%;
max-width:200px;
}
</style>
</head>

<body>

<h2>ISO Amplification</h2>

<div id="container">
<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none"></canvas>
<div id="shutter"></div>
</div>

<div class="controls">
<input type="range" id="iso" min="100" max="12000" value="200">
<div>ISO: <span id="isoValue">200</span></div>

<button onclick="capture()">Capture Full Resolution</button>
<button onclick="switchCamera()">Switch Camera</button>
</div>

<script>

/* Disable right click */
document.addEventListener("contextmenu", e => e.preventDefault());

/* Disable common shortcuts including Ctrl+U */
document.addEventListener("keydown", function(e){

const key = e.key.toLowerCase();

// Ctrl + U (view source)
if (e.ctrlKey && key === "u") {
e.preventDefault();
return false;
}

// other common inspect shortcuts
if (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(key)) {
e.preventDefault();
return false;
}

// Ctrl + S / P
if (e.ctrlKey && ["s","p","u"].includes(key)) {
e.preventDefault();
return false;
}

// F12
if (e.key === "F12") {
e.preventDefault();
return false;
}
});

/* ===== CAMERA LOGIC ===== */

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const shutter = document.getElementById("shutter");

const isoSlider = document.getElementById("iso");
const isoValue = document.getElementById("isoValue");

let stream;
let front = false;

isoSlider.oninput = function(){
isoValue.innerText = isoSlider.value;
applyISO();
}

function applyISO(){
let iso = isoSlider.value;
let brightness = Math.pow(iso/200,0.5);
brightness = Math.min(brightness,4);
video.style.filter = `brightness(${brightness})`;
}

async function startCamera(){

if(stream){
stream.getTracks().forEach(t=>t.stop());
}

const constraints = {
video:{
facingMode: front ? "user" : "environment",
width:{ideal:8000},
height:{ideal:6000},
aspectRatio:{ideal:4/3},
frameRate:{ideal:30,max:60}
},
audio:false
};

try{
stream = await navigator.mediaDevices.getUserMedia(constraints);
video.srcObject = stream;
}catch(e){
alert("Camera requires HTTPS or localhost");
}
}

function switchCamera(){
front = !front;
startCamera();
}

function capture(){

shutter.style.opacity = 1;

setTimeout(()=>{

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");
ctx.filter = video.style.filter;

ctx.drawImage(video,0,0,canvas.width,canvas.height);

shutter.style.opacity = 0;

const link = document.createElement("a");
link.download = "mycam_pro_photo.png";
link.href = canvas.toDataURL("image/png");
link.click();

},80);
}

applyISO();
startCamera();

</script>

</body>
</html>
