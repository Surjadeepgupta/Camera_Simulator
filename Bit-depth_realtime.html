<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bit Depth Color + Contrast Analyzer</title>

<style>

body{
background:linear-gradient(135deg,#c8102e 0%,#8b0000 45%,#111 100%);
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
width:1000px;
margin:auto;
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.view{
position:relative;
border:3px solid #333;
background:#111;
}

canvas{
width:100%;
height:250px;
display:block;
}

.overlay{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:8px;
font-size:13px;
border-radius:6px;
line-height:1.4;
}

.title{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:6px;
font-size:13px;
}

</style>

</head>

<body>
<h2>Color-Bit Depth Realtime Simulator</h2>
<div class="container">

<div class="view">
<canvas id="c8"></canvas>
<div class="overlay" id="o8"></div>
<div class="title">8 Bit</div>
</div>

<div class="view">
<canvas id="c10"></canvas>
<div class="overlay" id="o10"></div>
<div class="title">10 Bit</div>
</div>

<div class="view">
<canvas id="c12"></canvas>
<div class="overlay" id="o12"></div>
<div class="title">12 Bit</div>
</div>

<div class="view">
<canvas id="c16"></canvas>
<div class="overlay" id="o16"></div>
<div class="title">16 Bit</div>
</div>

</div>

<video id="cam" autoplay playsinline style="display:none"></video>

<script>

const video=document.getElementById("cam")
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream)

const ctx8=c8.getContext("2d")
const ctx10=c10.getContext("2d")
const ctx12=c12.getContext("2d")
const ctx16=c16.getContext("2d")

const tempCanvas=document.createElement("canvas")
const tctx=tempCanvas.getContext("2d")

function applyContrast(value,contrast){
return ((value-128)*contrast)+128
}

function process(){

let w=320,h=240
tempCanvas.width=w
tempCanvas.height=h

tctx.drawImage(video,0,0,w,h)
let frame=tctx.getImageData(0,0,w,h)
let data=frame.data

/* CENTER PIXEL */

let cx=Math.floor(w/2)
let cy=Math.floor(h/2)
let i=(cy*w+cx)*4

let r=data[i]
let g=data[i+1]
let b=data[i+2]

let total=r+g+b+1

let rP=Math.floor((r/total)*100)
let gP=Math.floor((g/total)*100)
let bP=Math.floor((b/total)*100)

/* DOMINANT COLOR */

let dominant="R"
if(gP>rP && gP>bP) dominant="G"
if(bP>rP && bP>gP) dominant="B"

/* APPLY CONTRAST PER BIT */

function processFrame(contrast){

let newFrame=new Uint8ClampedArray(data.length)

for(let i=0;i<data.length;i+=4){

newFrame[i]=Math.min(255,Math.max(0,applyContrast(data[i],contrast)))
newFrame[i+1]=Math.min(255,Math.max(0,applyContrast(data[i+1],contrast)))
newFrame[i+2]=Math.min(255,Math.max(0,applyContrast(data[i+2],contrast)))
newFrame[i+3]=255

}

return new ImageData(newFrame,w,h)

}

/* CONTRAST LEVELS */
let f8=processFrame(0.7)   // flat
let f10=processFrame(0.9)
let f12=processFrame(1.1)
let f16=processFrame(1.3)  // strong

/* DRAW */

ctx8.putImageData(f8,0,0)
ctx10.putImageData(f10,0,0)
ctx12.putImageData(f12,0,0)
ctx16.putImageData(f16,0,0)

/* OVERLAY */

function update(id){
document.getElementById(id).innerHTML=
`Dominant: ${dominant}<br>
R: ${rP}%<br>
G: ${gP}%<br>
B: ${bP}%`
}

update("o8")
update("o10")
update("o12")
update("o16")

requestAnimationFrame(process)

}

video.onplaying=process
	
document.addEventListener(
"contextmenu",
e=>e.preventDefault()
);

document.addEventListener(
"selectstart",
e=>e.preventDefault()
);

document.addEventListener(
"dragstart",
e=>e.preventDefault()
);

document.addEventListener(
"copy",
e=>e.preventDefault()
);

document.addEventListener(
"cut",
e=>e.preventDefault()
);

document.addEventListener(
"paste",
e=>e.preventDefault()
);

document.addEventListener(
"keydown",
function(e){

const key = e.key.toLowerCase();

if(e.key==="F12"){
e.preventDefault();
}

if(e.ctrlKey && key==="u"){
e.preventDefault();
}

if(e.ctrlKey && key==="s"){
e.preventDefault();
}

if(
e.ctrlKey &&
e.shiftKey &&
key==="i"
){
e.preventDefault();
}

if(
e.ctrlKey &&
e.shiftKey &&
key==="j"
){
e.preventDefault();
}

if(
e.ctrlKey &&
e.shiftKey &&
key==="c"
){
e.preventDefault();
}

}
);

/* DEVTOOLS */

(function(){

function detectDevTools(){

const widthThreshold =
window.outerWidth -
window.innerWidth > 160;

const heightThreshold =
window.outerHeight -
window.innerHeight > 160;

if(
widthThreshold ||
heightThreshold
){

document.body.innerHTML = `

<div style="
width:100vw;
height:100vh;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-family:Arial;
color:red;
">

<div style="
font-size:38px;
font-weight:bold;
margin-bottom:20px;
">

Developer Tools Blocked

</div>

<div style="
font-size:16px;
opacity:0.7;
">

Source Inspection Disabled

</div>

</div>

`;

}

}

setInterval(
detectDevTools,
500
);

})();

/* CLEAR */

setInterval(function(){

console.clear();

},1000);

</script>

</body>
</html>
